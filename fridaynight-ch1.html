<!DOCTYPE html>
<html>
<head>
    <title>Baca Komik - Ghost Fujodanshi</title>
    <style>
        body { background-color: #1a1a1a; margin: 0; padding: 0; } /* Background gelap supaya nyaman lihat gambar */
        
        .komik-viewer {
            max-width: 800px; /* Lebar maksimal halaman */
            margin: 0 auto;
            text-align: center;
        }

        /* Mengatur agar gambar pas di layar HP */
        .komik-viewer img {
            width: 100%; 
            display: block; /* Menghilangkan celah putih antar gambar */
        }

        /* Container Navigasi */
.nav-chapter {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 20px auto;
    max-width: 600px;
    padding: 10px;
}

/* Gaya Tombol */
.btn-nav {
    background-color: #9b59b6;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 14px;
}

/* Efek saat tombol tidak aktif (misal Chapter 1 tidak punya Prev) */
.btn-disabled {
    background-color: #ccc;
    color: #666;
    cursor: not-allowed;
    pointer-events: none;
}

.btn-nav:hover { background-color: #4a1c40; }

/* Gaya untuk kotak dukungan */
.dukungan {
    background-color: white;
    padding: 30px;
    margin: 40px auto;
    max-width: 500px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.tombol-donasi {
    display: flex;
    justify-content: center;
    gap: 15px; /* Jarak antar tombol */
    margin-top: 20px;
}

/* Tombol Trakteer (Warna Merah Khas) */
.btn-trakteer {
    background-color: #e74c3c;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

/* Tombol Ko-fi (Warna Biru Khas) */
.btn-kofi {
    background-color: #2980b9;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

/* Efek saat mouse diarahkan ke tombol */
.btn-trakteer:hover, .btn-kofi:hover {
    opacity: 0.8;
    transform: scale(1.05);
    </style>
</head>
<body>

    <!-- Navigasi Chapter -->
